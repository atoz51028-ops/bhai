<style>
  * {

  body {

    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #dac9b9;
    font-family: "Segoe UI", sans-serif;
  }

  .a {
    height: 100%;
    width: 500px;
    background-color: rgb(241, 229, 209);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #a {
    font-size: 25px;
    font-weight: 800;
    font-family: emoji;
    display: flex;
    position: relative;
    bottom: 100px;
    color: #cb9a05;
  }

  #b0 {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 100%;
    height: 260px;
    width: 260px;
    border: 3px solid #dab473;
  }

  #b1 {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 100%;
    height: 190px;
    width: 200px;
    border: 2px solid #eab96430;
  }

  #b2 {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 170px;
    background: #f2994a; /* fallback for old browsers */
    background: -webkit-linear-gradient(
      to bottom,
      #f2c94c,
      #f2994a
    ); /* Chrome 10-25, Safari 5.1-6 */
    background: linear-gradient(
      to bottom,
      #f2c94c,
      #f2994a
    ); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
    border-radius: 100%;
    width: 170px;
    position: relative;
    bottom: 7px;
    animation: bounce 5s infinite;

  @keyframes bounce {
    50% {
      transform: translateY(7px);
